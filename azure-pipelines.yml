# Azure DevOps pipeline: install, test, optional npm publish.
# Set secret variable NPM_TOKEN in the pipeline library for Publish.
# Run with parameter publishPackage=true only when you intend to publish.

parameters:
  - name: publishPackage
    displayName: Publish package to npm
    type: boolean
    default: false

trigger:
  branches:
    include:
      - main
      - master

pr:
  branches:
    include:
      - main
      - master

pool:
  name: private-self-hosted-pool

variables:
  NODE_VERSION: '20.x'

stages:
  - stage: Build
    displayName: Build
    jobs:
      - job: BuildAndTest
        displayName: Install dependencies and run tests
        steps:
          - task: NodeTool@0
            displayName: Use Node.js
            inputs:
              versionSpec: $(NODE_VERSION)
          - script: npm ci
            displayName: npm ci
          - script: npm test
            displayName: npm test

  - stage: Publish
    displayName: Publish
    dependsOn: Build
    condition: and(succeeded(), eq('${{ parameters.publishPackage }}', true))
    jobs:
      - job: NpmPublish
        displayName: npm publish
        steps:
          - task: NodeTool@0
            displayName: Use Node.js
            inputs:
              versionSpec: $(NODE_VERSION)
          - script: npm ci
            displayName: npm ci
          - script: echo "//registry.npmjs.org/:_authToken=$(NPM_TOKEN)" > .npmrc
            displayName: Configure npm registry auth
            env:
              NPM_TOKEN: $(NPM_TOKEN)
          - script: npm publish --access public
            displayName: npm publish
            env:
              NPM_TOKEN: $(NPM_TOKEN)
