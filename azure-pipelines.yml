# Azure DevOps: test, then optionally publish to Azure Artifacts (npm feed).
# Prerequisites:
# - Feed URL matches .npmrc / package.json publishConfig.
# - Feed has npmjs.org as an upstream source (so npm ci can resolve public packages).
# - Build Service: grant the feed's Contributor (or Feed Publisher) role to
#   "Project Collection Build Service (<Org>)" or "<Project> Build Service" as needed.
# Run with publishPackage=true when you intend to publish. Bump package.json version first.
#
# If a parent pipeline invokes this one (or you use Run pipeline), publishPackage defaults
# to false — only Build runs. Set publishPackage to true in the parent parameters / Run
# dialog when you want the Publish stage (Azure Artifacts) to run.
#
# The Publish stage is included only when publishPackage is true (template compile time).
# Do not use runtime condition eq('${{ parameters.publishPackage }}', true) — that compares
# a string to a boolean and the Publish stage would never run.

parameters:
  - name: publishPackage
    displayName: Publish package to Azure Artifacts
    type: boolean
    default: false

trigger:
  branches:
    include:
      - main
      - master

pr:
  branches:
    include:
      - main
      - master

pool:
  name: private-self-hosted-pool

variables:
  NODE_VERSION: '20.x'

stages:
  - stage: Build
    displayName: Build
    jobs:
      - job: BuildAndTest
        displayName: Install dependencies and run tests
        steps:
          - task: NodeTool@0
            displayName: Use Node.js
            inputs:
              versionSpec: $(NODE_VERSION)
          - task: npmAuthenticate@0
            displayName: npm authenticate (Azure Artifacts)
            inputs:
              workingFile: $(Build.SourcesDirectory)/.npmrc
          - script: npm ci
            displayName: npm ci
          - script: npm test
            displayName: npm test

  - ${{ if eq(parameters.publishPackage, true) }}:
    - stage: Publish
      displayName: Publish
      dependsOn: Build
      jobs:
        - job: NpmPublish
          displayName: npm publish to Azure Artifacts
          steps:
            - task: NodeTool@0
              displayName: Use Node.js
              inputs:
                versionSpec: $(NODE_VERSION)
            - task: npmAuthenticate@0
              displayName: npm authenticate (Azure Artifacts)
              inputs:
                workingFile: $(Build.SourcesDirectory)/.npmrc
            - script: npm ci
              displayName: npm ci
            - script: npm publish
              displayName: npm publish
